repos:
  - repo: https://github.com/crate-ci/typos
    rev: v1.33.1
    hooks:
      - id: typos
        args: ["--config", ".typos.toml"]
  - repo: local
    hooks:
      - id: mkdocs-warnings
        name: mkdocs build (check for warnings)
        entry: bash scripts/check-mkdocs-warnings.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true